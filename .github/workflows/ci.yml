name: shared-puck-ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & validate
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (runs registry generation as prebuild)
        run: npm run build

      - name: Validate registry JSON
        run: node -e "
          const r = require('./dist/registry.json');
          const components = r.components || [];
          if (!Array.isArray(components)) {
            console.error('registry.json: components must be an array');
            process.exit(1);
          }
          const ids = new Set();
          for (const c of components) {
            if (!c.id) { console.error('missing id:', JSON.stringify(c)); process.exit(1); }
            if (!c.category) { console.error('missing category:', c.id); process.exit(1); }
            if (!c.fields || typeof c.fields !== 'object') {
              console.error('missing fields object:', c.id);
              process.exit(1);
            }
            if (ids.has(c.id)) { console.error('duplicate id:', c.id); process.exit(1); }
            ids.add(c.id);
          }
          console.log('registry OK: ' + components.length + ' components');
        "

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: shared-puck-dist
          path: dist/
          retention-days: 7
